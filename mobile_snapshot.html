:root{
  --bg:#f4f6f8;
  --panel:#ffffff;
  --soft:#eef2f5;
  --line:#d9e0e6;
  --text:#1c2733;
  --muted:#667789;
  --accent:#315d8f;
  --accent-2:#0f4c81;
  --good:#2e7d32;
  --warn:#b7791f;
  --bad:#b42318;
  --locum:#6b46c1;
  --shadow:0 6px 18px rgba(26,39,53,.08);

*{box-sizing:border-box}
html,body{margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif;color:var(--text);background:var(--bg)}
a{color:var(--accent-2);text-decoration:none}
button,input,select,textarea{font:inherit}
button{cursor:pointer}
.hidden{display:none!important}
.page-shell{display:grid;grid-template-columns:240px minmax(0,1fr) 330px;min-height:100vh;gap:16px;padding:16px}
.sidebar,.main-panel,.inspector,.home-shell,.mobile-shell{background:var(--panel);border:1px solid var(--line);box-shadow:var(--shadow);border-radius:18px}
.sidebar{padding:16px;position:sticky;top:16px;height:calc(100vh - 32px);overflow:auto}
.brand{font-size:21px;font-weight:700;margin-bottom:6px}
.brand-sub{color:var(--muted);font-size:13px;margin-bottom:18px}
.side-nav{display:flex;flex-direction:column;gap:6px}
.side-nav button{background:transparent;border:1px solid transparent;border-radius:10px;padding:11px 12px;text-align:left;color:var(--text)}
.side-nav button.active,.side-nav button:hover{background:#eef4fb;border-color:#cfe0f4;color:var(--accent-2)}
.side-footer{margin-top:18px;padding-top:14px;border-top:1px solid var(--line);color:var(--muted);font-size:12px}
.main-panel{padding:18px;overflow:auto}
.inspector{padding:18px;position:sticky;top:16px;height:calc(100vh - 32px);overflow:auto}
.topbar{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;margin-bottom:16px;flex-wrap:wrap}
.title-block h1{margin:0 0 6px;font-size:28px}
.subtitle{margin:0;color:var(--muted)}
.action-row,.inline-actions,.form-row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.action-row button,.btn{border:1px solid var(--line);background:#fff;padding:10px 14px;border-radius:10px;color:var(--text)}
.action-row button.primary,.btn.primary{background:var(--accent);border-color:var(--accent);color:#fff}
.action-row button.ghost,.btn.ghost{background:#f7fafc}
.action-row button.warn,.btn.warn{background:#fff7ed;border-color:#f0d4ae;color:#9a5f06}

.top-inputs input,.top-inputs select,.field,textarea{border:1px solid var(--line);background:#fff;padding:10px 12px;border-radius:10px;min-height:42px}
.summary-grid{display:grid;grid-template-columns:repeat(6,minmax(130px,1fr));gap:12px;margin-bottom:16px}
.card{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:14px;box-shadow:var(--shadow)}
.stat-card h3{margin:0 0 8px;font-size:13px;color:var(--muted);font-weight:600}
.stat-value{font-size:24px;font-weight:700}
.stat-sub{color:var(--muted);font-size:12px;margin-top:6px}
.section-title{display:flex;justify-content:space-between;align-items:center;gap:10px;margin:18px 0 10px}
.section-title h2{margin:0;font-size:19px}
.panel-grid{display:grid;grid-template-columns:2fr 1fr;gap:14px}
.stack{display:flex;flex-direction:column;gap:14px}

.notice{border:1px solid var(--line);border-left:4px solid var(--accent);padding:10px 12px;border-radius:10px;background:#fcfdff;font-size:14px}
.notice.warning{border-left-color:var(--warn);background:#fffaf1}
.notice.error{border-left-color:var(--bad);background:#fff5f5}
.badge{display:inline-flex;align-items:center;gap:6px;border-radius:999px;padding:5px 10px;font-size:12px;font-weight:600;border:1px solid var(--line);background:#f8fafc;color:var(--text)}

.assign-chip.locum{background:#f5f3ff;border-color:#ddd6fe;color:var(--locum)}
.assign-chip.unfilled{background:#fff5f5;border-color:#fecaca;color:#b42318}
.assign-chip.weekend{background:#fffaf0;border-color:#f3d6a1;color:#9a5f06}
.muted{color:var(--muted)}
.tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.tabs button{background:#fff;border:1px solid var(--line);padding:10px 12px;border-radius:10px}
.tabs button.active{background:#eef4fb;border-color:#cfe0f4;color:var(--accent-2)}
.inspector h3{margin:0 0 12px}
.detail-box{border:1px solid var(--line);border-radius:14px;padding:12px;background:#fafcfe;margin-bottom:12px}
.kv{display:grid;grid-template-columns:110px 1fr;gap:8px;font-size:14px}
.kv div:nth-child(odd){color:var(--muted)}
.calendar-month{border:1px solid var(--line);border-radius:16px;background:#fff;overflow:hidden}
.month-title{padding:12px 14px;background:#f8fafc;border-bottom:1px solid var(--line);font-weight:700}
.month-grid{display:grid;grid-template-columns:repeat(7,1fr)}
.day-head,.day-cell{border-right:1px solid var(--line);border-bottom:1px solid var(--line);min-height:92px;padding:8px}
.day-head{min-height:auto;background:#fcfdff;font-size:12px;color:var(--muted);font-weight:700}
.month-grid > :nth-child(7n){border-right:none}
.day-num{font-size:12px;color:var(--muted);margin-bottom:8px}
.day-owner{font-size:13px;font-weight:700;display:inline-block;padding:4px 8px;border-radius:999px;background:#eef4fb;border:1px solid #d2e3f4}
.day-owner.locum{background:#f5f3ff;border-color:#ddd6fe;color:var(--locum)}

.day-cell.unfilled{background:#fff5f5}
.list{display:flex;flex-direction:column;gap:10px}
.list-item{border:1px solid var(--line);border-radius:14px;padding:12px;background:#fff}
.request-strip{display:flex;gap:8px;overflow:auto;padding:8px 2px}
.date-pill{min-width:54px;border:1px solid var(--line);border-radius:12px;padding:8px 6px;background:#fff;text-align:center;cursor:pointer}
.date-pill small{display:block;color:var(--muted);font-size:11px}
.date-pill.active,.date-pill.in-range{background:#eef4fb;border-color:#cfe0f4}

.selector-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:14px}
.checkbox-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:8px}
.check-card{border:1px solid var(--line);border-radius:12px;padding:10px;background:#fff}
.quick-card{border:1px solid var(--line);border-radius:14px;padding:12px;background:#fff}
.home-shell{max-width:980px;margin:28px auto;padding:28px}
.home-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-top:20px}
.portal-link{display:block;border:1px solid var(--line);border-radius:16px;padding:18px;background:#fff;box-shadow:var(--shadow)}
.portal-link h2{margin:0 0 8px;font-size:20px}
.mobile-shell{max-width:760px;margin:14px auto;padding:16px}
.card-grid-2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.small{font-size:12px;color:var(--muted)}
.code{font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace}
@media (max-width: 1220px){
  .page-shell{grid-template-columns:220px minmax(0,1fr)}
  .inspector{grid-column:1 / -1;position:static;height:auto}
}
@media (max-width: 900px){
  .page-shell{grid-template-columns:1fr;padding:10px}
  .sidebar{position:static;height:auto}
  .summary-grid{grid-template-columns:repeat(2,1fr)}
  .panel-grid,.card-grid-2,.home-grid{grid-template-columns:1fr}
}

<script>(function(){
  const STORAGE_KEY = 'schedulerRebuildStateV13';

  function storageAvailable(){

      ...deepClone(base),
      ...(map[base.id] || {}),
      fairnessWeights: deepClone(base.fairnessWeights || (map[base.id]?.fairnessWeights) || {}),
      weeklyCoverage: deepClone(map[base.id]?.weeklyCoverage || base.weeklyCoverage || []),
      callDates: deepClone(map[base.id]?.callDates || base.callDates || []),
      weekendDates: deepClone(map[base.id]?.weekendDates || base.weekendDates || [])
    }));
  }

  
  function applyOneTimeFreshReset(merged){
    const marker = 'fresh_start_v1';
    if(merged?.metadata?.buildResetMarker === marker) return merged;
    merged.draftWeeks = [];
    merged.publishedWeeks = [];
    merged.draftNightManual = [];
    merged.publishedNightManual = [];
    merged.overrideLog = [];
    merged.fairnessCarryForward = {};
    merged.publishHistory = [];
    merged.publishedArchives = [];
    merged.currentPublishedArchiveId = '';
    merged.generatedSummary = { fairnessSummary: [], validation: [] };
    merged.metadata = { ...(merged.metadata || {}), lastGeneratedAt: null, lastPublishedAt: null, buildResetMarker: marker };
    return merged;
  }

  function publishRangeExists(state, start, end){
    return (state.publishedArchives || []).some(a => a.start === start && a.end === end);
  }

  function removePublishedScheduleById(state, archiveId=''){
    if(!archiveId) return state;
    state.publishedArchives = (state.publishedArchives || []).filter(a => a.id !== archiveId);
    state.publishHistory = (state.publishHistory || []).filter(p => p.id !== archiveId);
    if(state.currentPublishedArchiveId === archiveId){
      const next = (state.publishedArchives || [])[0];
      state.currentPublishedArchiveId = next ? next.id : '';
      if(next){
        state.publishedWeeks = deepClone(next.weeks || []);
        state.publishedNightManual = deepClone(next.nightAssignments || []);
        state.metadata.lastPublishedAt = next.publishedAt || null;
      } else {
        state.publishedWeeks = [];
        state.publishedNightManual = [];
        state.metadata.lastPublishedAt = null;
      }
    } else if(!(state.publishedArchives || []).length){
      state.publishedWeeks = [];
      state.publishedNightManual = [];
      state.metadata.lastPublishedAt = null;
    }
    return state;
  }

function loadState(){
    try{
      const raw = readRaw();
      if(!raw){
        const init = defaultState();
        saveState(init);
        return init;
      }
      const parsed = JSON.parse(raw);
      const base = defaultState();
      const merged = {
        ...base,
        ...parsed,
        physicians: mergePeople(parsed.physicians, base.physicians),
        locums: mergePeople(parsed.locums, base.locums),
        requests: parsed.requests || [],
        draftWeeks: parsed.draftWeeks || [],
        publishedWeeks: parsed.publishedWeeks || [],
        draftNightManual: parsed.draftNightManual || [],
        publishedNightManual: parsed.publishedNightManual || [],
        overrideLog: parsed.overrideLog || [],
        settings: { ...base.settings, ...(parsed.settings || {}) },
        metadata: { ...base.metadata, ...(parsed.metadata || {}) },
        fairnessCarryForward: parsed.fairnessCarryForward || {},
        publishHistory: parsed.publishHistory || [],
        publishedArchives: parsed.publishedArchives || [],
        currentPublishedArchiveId: parsed.currentPublishedArchiveId || '',
        generatedSummary: { ...base.generatedSummary, ...(parsed.generatedSummary || {}) }
      };
      applyOneTimeFreshReset(merged);
      saveState(merged);
      return merged;
    }catch(err){
      console.error('loadState failed', err);
      const init = defaultState();
      saveState(init);
      return init;
    }
  }

  function saveState(state){ writeRaw(JSON.stringify(state)); }
  function updateState(mutator){
    const current = loadState();
    const next = mutator(deepClone(current)) || current;
    saveState(next);
    return next;
  }
  function resetState(){ const init = defaultState(); saveState(init); return init; }
  function publishDraft(){
    return updateState(state => {
      const start = state.settings?.scheduleStart || '';
      const end = state.settings?.scheduleEnd || '';
      if(publishRangeExists(state, start, end)) return state;
      const now = new Date().toISOString();
      const archiveId = `pub_${Date.now()}`;
      state.publishedWeeks = deepClone(state.draftWeeks);
      state.publishedNightManual = deepClone(state.draftNightManual);
      const fairnessSummary = (state.generatedSummary?.fairnessSummary || []);
      state.fairnessCarryForward = state.fairnessCarryForward || {};
      if(typeof accumulateFairnessIntoCarryForward === 'function'){
        state.fairnessCarryForward = accumulateFairnessIntoCarryForward(state.fairnessCarryForward || {}, fairnessSummary);
      }
      state.publishHistory = state.publishHistory || [];
      state.publishHistory.push({ id: archiveId, publishedAt: now, start, end, fairnessSummary: deepClone(fairnessSummary) });
      state.publishedArchives = state.publishedArchives || [];
      state.publishedArchives.push({ id: archiveId, publishedAt: now, start, end, weeks: deepClone(state.draftWeeks || []), nightAssignments: deepClone(state.draftNightManual || []) });
      state.currentPublishedArchiveId = archiveId;
      state.metadata.lastPublishedAt = now;
      return state;
    });
  }
  function upsertRequest(req){
    return updateState(state => {
      const idx = state.requests.findIndex(r => r.id === req.id);
      if(idx >= 0) state.requests[idx] = req;
      else state.requests.push(req);
      return state;
    });
  }
  function removeRequest(id){
    return updateState(state => {
      state.requests = state.requests.filter(r => r.id !== id);
      return state;
    });
  }
  function saveLocum(locumId, patch){
    return updateState(state => {
      const idx = state.locums.findIndex(l => l.id === locumId);
      if(idx >= 0) state.locums[idx] = { ...state.locums[idx], ...deepClone(patch) };
      return state;
    });
  }
  function addOverride(entry){
    return updateState(state => { state.overrideLog.unshift(entry); return state; });
  }
  function clearOverrides(){
    return updateState(state => { state.overrideLog = []; return state; });
  }

  window.AppState = {
    STORAGE_KEY,
    deepClone,
    defaultState,
    loadState,
    saveState,
    updateState,
    resetState,
    publishDraft,
    publishRangeExists,
    removePublishedScheduleById,
    upsertRequest,
    removeRequest,
    saveLocum,
    addOverride,
    clearOverrides
  };
})();

<script>(function(){
  const MAJOR_SERVICES = ['ICU','GIM','CAR1','CAR2','Resp','Nephro','OP1','OP2','OP3'];
  const REQUIRED_SERVICES = ['Resp','Nephro','ICU','GIM','CAR1','CAR2'];
  const OPTIONAL_OP_SERVICES = ['OP1','OP2','OP3'];
  const ROW_SERVICES = ['ICU','GIM','CAR1','CAR2','Resp','Nephro','OP1','OP2','OP3','Echo','Weekend'];
  const OP_SERVICES = ['OP1','OP2','OP3'];
  const ECHO_ALLOWED = ['ICU','GIM','CAR1','CAR2','OP1','OP2','OP3'];

  function iso(date){ return new Date(date.getTime() - date.getTimezoneOffset()*60000).toISOString().slice(0,10); }
  function parseDate(str){ return new Date(str + 'T12:00:00'); }
  function addDays(date, days){ const d = new Date(date); d.setDate(d.getDate()+days); return d; }
  function monthKey(dateStr){ return dateStr.slice(0,7); }
  function startOfWeekMonday(date){ const d = new Date(date); const day = (d.getDay()+6)%7; return addDays(d, -day); }
  function daterange(start, end){ const arr=[]; let cur=new Date(start); while(cur<=end){ arr.push(new Date(cur)); cur=addDays(cur,1); } return arr; }
  function unique(arr){ return [...new Set(arr)]; }

  function getWeeks(startStr, endStr){
    const start = parseDate(startStr);
    const end = parseDate(endStr);
    const firstMon = startOfWeekMonday(start);
    const weeks = [];
    let cur = new Date(firstMon);
    while(cur <= end){
      const weekStart = iso(cur);
      weeks.push({
        weekStart,
        weekEnd: iso(addDays(cur,4)),
        weekendStart: iso(addDays(cur,5)),
        weekendEnd: iso(addDays(cur,6)),
        month: weekStart.slice(0,7),
        services: Object.fromEntries(MAJOR_SERVICES.concat(['Echo']).map(s => [s,''])),
        weekendOwner: '',
        validation: []
      });
      cur = addDays(cur,7);
    }
    return weeks;
  }

  function getAllPeople(state){ return [...state.physicians, ...state.locums]; }
  function personMap(state){ return Object.fromEntries(getAllPeople(state).map(p => [p.id, p])); }
  function physicianMap(state){ return Object.fromEntries(state.physicians.map(p => [p.id, p])); }
  function getApprovedRequests(state){ return (state.requests || []).filter(r => r.status !== 'denied'); }
  function requestOverlap(r, startStr, endStr){ return !(r.endDate < startStr || r.startDate > endStr); }
  function hasRequest(state, personId, type, startStr, endStr){
    return getApprovedRequests(state).some(r => r.personId === personId && r.type === type && requestOverlap(r, startStr, endStr));
  }
  function hasVacation(state, personId, startStr, endStr){ return hasRequest(state, personId, 'vacation', startStr, endStr); }
  function getLocumById(state, id){ return (state.locums || []).find(l => l.id === id); }

  function canDoService(person, service){
    if(!person) return false;
    if(service === 'Echo') return !!person.echoEligible;
    if(OP_SERVICES.includes(service)) return !!person.opEligible;
    if(service === 'Weekend') return !!person.weekendEligible;
    if(service === 'Night') return !!person.nightEligible;
    return (person.services || []).includes(service);
  }

  function fairnessWeight(person, bucket){
    const w = person?.fairnessWeights || {};
    if(bucket === 'service') return w.weeklyServices || 1;
    if(bucket === 'icu') return w.icu || 1;
    if(bucket === 'weekend') return w.weekends || 1;
    if(bucket === 'night') return w.weekdayCall || 1;
    return 1;
  }

  function targetPhysicianIdForAssignment(state, ownerId){
    const person = personMap(state)[ownerId];
    if(!person) return null;
    if(person.type !== 'locum') return ownerId;
    if(person.generalLocum) return null;
    return person.coveringPhysician || null;
  }

  function initFairnessStore(state){
    const store = {};
    state.physicians.forEach(p => {
      store[p.id] = {
        id:p.id,
        name:p.name,
        weekends:0,
        nightCalls:0,
        icuWeeks:0,
        weeklyServices:0,
        serviceCounts:{},
        weighted:{ weekends:0, nightCalls:0, icu:0, services:0 }
      };
    });
    return store;
  }

  function addFairnessCharge(state, store, ownerId, kind, service){
    const targetId = targetPhysicianIdForAssignment(state, ownerId);
    if(!targetId || !store[targetId]) return;
    const person = physicianMap(state)[targetId];
    if(kind === 'weekend'){
      store[targetId].weekends += 1;
      store[targetId].weighted.weekends = +(store[targetId].weekends / fairnessWeight(person,'weekend')).toFixed(2);
    } else if(kind === 'night'){
      store[targetId].nightCalls += 1;
      store[targetId].weighted.nightCalls = +(store[targetId].nightCalls / fairnessWeight(person,'night')).toFixed(2);
    } else if(kind === 'service'){
      if(service === 'ICU'){
        store[targetId].icuWeeks += 1;
        store[targetId].weighted.icu = +(store[targetId].icuWeeks / fairnessWeight(person,'icu')).toFixed(2);
      } else {
        store[targetId].weeklyServices += 1;
        store[targetId].weighted.services = +(store[targetId].weeklyServices / fairnessWeight(person,'service')).toFixed(2);
      }
      if(service){ store[targetId].serviceCounts[service] = (store[targetId].serviceCounts[service] || 0) + 1; }
    }
  }

  function summarizeFairness(state, weeks, nights){
    const store = initFairnessStore(state);
    weeks.forEach(week => {
      MAJOR_SERVICES.forEach(service => { if(week.services[service]) addFairnessCharge(state, store, week.services[service], 'service', service); });
      if(week.weekendOwner) addFairnessCharge(state, store, week.weekendOwner, 'weekend');
    });
    (nights || []).filter(n => !n.weekend && n.owner).forEach(n => addFairnessCharge(state, store, n.owner, 'night'));
    return Object.values(store).map(item => {
      item.compositeScore = +(
        item.weighted.services + item.weighted.icu + item.weighted.weekends + item.weighted.nightCalls
      ).toFixed(2);
      return item;
    }).sort((a,b) => a.compositeScore - b.compositeScore || a.id.localeCompare(b.id));
  }

  
  function applyPinnedAssignments(state, weeks){
    const priorWeeks = state.draftWeeks || [];
    const priorMap = Object.fromEntries(priorWeeks.map(w => [w.weekStart, w]));
    weeks.forEach(week => {
      const prior = priorMap[week.weekStart];
      if(!prior) return;
      week.pinnedServices = Object.assign({}, prior.pinnedServices || {});
      Object.keys(week.pinnedServices).forEach(service => {
        if(!week.pinnedServices[service]) return;
        if(service === 'Weekend') week.weekendOwner = prior.weekendOwner || '';
        else week.services[service] = (prior.services || {})[service] || '';
      });
    });
  }

  function currentScore(store, id, bucket){
    if(!store[id]) return 999;
    if(bucket === 'weekend') return store[id].weighted.weekends;
    if(bucket === 'night') return store[id].weighted.nightCalls;
    if(bucket === 'ICU') return store[id].weighted.icu;
    return store[id].weighted.services;
  }

  function buildAvailability(state, weeks){
    const avail = {};
    getAllPeople(state).forEach(person => {
      avail[person.id] = {};
      weeks.forEach(week => {
        avail[person.id][week.weekStart] = {
          serviceAvailable: !hasVacation(state, person.id, week.weekStart, week.weekendEnd),
          nightAvailable: !hasVacation(state, person.id, week.weekStart, week.weekendEnd) && !hasRequest(state, person.id,'no_call',week.weekStart, week.weekEnd) && !hasRequest(state, person.id,'no_night_call',week.weekStart, week.weekEnd),
          weekendAvailable: !hasVacation(state, person.id, week.weekStart, week.weekendEnd) && !hasRequest(state, person.id,'weekends_off',week.weekendStart, week.weekendEnd),
          respRequested: hasRequest(state, person.id, 'resp_week_request', week.weekStart, week.weekEnd),
          nephroRequested: hasRequest(state, person.id, 'nephro_week_request', week.weekStart, week.weekEnd)
        };
      });
    });
    return avail;
  }

  function peopleAssignedThisWeek(week){
    const ids = {};
    MAJOR_SERVICES.forEach(service => { if(week.services[service]) ids[week.services[service]] = service; });
    return ids;
  }

  
  function serviceBucketWeight(person, service){
    return service === 'ICU' ? fairnessWeight(person,'icu') : fairnessWeight(person,'service');
  }

  function computeServiceTargets(state, weeks, services){
    const targets = {};
    (services || MAJOR_SERVICES).forEach(service => {
      const eligible = state.physicians.filter(p => canDoService(p, service));
      const totalWeight = eligible.reduce((sum, p) => sum + serviceBucketWeight(p, service), 0) || 1;
      targets[service] = {};
      eligible.forEach(p => {
        targets[service][p.id] = +(weeks.length * serviceBucketWeight(p, service) / totalWeight).toFixed(4);
      });
    });
    return targets;
  }

  function serviceDeficitScore(store, personId, service, targets){
    const target = targets?.[service]?.[personId];
    if(target == null || target <= 0) return 999;
    const current = store[personId]?.serviceCounts?.[service] || 0;
    return +((current) / target).toFixed(4);
  }

  function serviceRecentPenalty(weeks, weekStart, personId, service){
    const idx = weeks.findIndex(w => w.weekStart === weekStart);
    if(idx <= 0) return 0;
    let penalty = 0;
    if(idx-1 >= 0 && weeks[idx-1].services?.[service] === personId) penalty += 0.25;
    if(idx-2 >= 0 && weeks[idx-2].services?.[service] === personId) penalty += 0.15;
    return penalty;
  }

  function overallWeeklyBurden(store, personId){
    if(!store[personId]) return 999;
    return +(store[personId].weighted.services + store[personId].weighted.icu).toFixed(4);
  }

  function opPriorityPenalty(service){
    return service === 'OP1' ? 0 : service === 'OP2' ? 0.2 : 0.4;
  }

  function serviceCandidates(state, availability, week, service, fairnessStore){
    const assigned = peopleAssignedThisWeek(week);
    return state.physicians.filter(p => {
      if(!canDoService(p, service)) return false;
      if(assigned[p.id]) return false;
      if(!availability[p.id][week.weekStart].serviceAvailable) return false;
      return true;
    }).sort((a,b) => {
      const aPref = service === 'Resp' ? (availability[a.id][week.weekStart].respRequested ? -1 : 0)
        : service === 'Nephro' ? (availability[a.id][week.weekStart].nephroRequested ? -1 : 0) : 0;
      const bPref = service === 'Resp' ? (availability[b.id][week.weekStart].respRequested ? -1 : 0)
        : service === 'Nephro' ? (availability[b.id][week.weekStart].nephroRequested ? -1 : 0) : 0;
      if(aPref !== bPref) return aPref - bPref;
      const as = currentScore(fairnessStore, a.id, service);
      const bs = currentScore(fairnessStore, b.id, service);
      if(as !== bs) return as - bs;
      return a.id.localeCompare(b.id);
    });
  }

  function addAssignmentChargeSimple(store, state, ownerId, kind, service){
    const targetId = targetPhysicianIdForAssignment(state, ownerId) || ownerId;
    if(!store[targetId]) return;
    const person = physicianMap(state)[targetId];
    if(kind === 'weekend'){
      store[targetId].weekends += 1;
      store[targetId].weighted.weekends = +(store[targetId].weekends / fairnessWeight(person,'weekend')).toFixed(2);
    } else if(kind === 'night'){
      store[targetId].nightCalls += 1;
      store[targetId].weighted.nightCalls = +(store[targetId].nightCalls / fairnessWeight(person,'night')).toFixed(2);
    } else if(kind === 'service'){
      if(service === 'ICU'){
        store[targetId].icuWeeks += 1;
        store[targetId].weighted.icu = +(store[targetId].icuWeeks / fairnessWeight(person,'icu')).toFixed(2);
      } else {
        store[targetId].weeklyServices += 1;
        store[targetId].weighted.services = +(store[targetId].weeklyServices / fairnessWeight(person,'service')).toFixed(2);
      }
    }
  }

  

function assignMajorServices(state, weeks, availability){
    const store = initFairnessStore(state);
    const requiredTargets = computeServiceTargets(state, weeks, REQUIRED_SERVICES);

    // Phase 1: distribute required services globally across the whole block.
    REQUIRED_SERVICES.forEach(service => {
      weeks.forEach(week => {
        const assigned = peopleAssignedThisWeek(week);
        const candidates = state.physicians.filter(p => {
          if(!canDoService(p, service)) return false;
          if(assigned[p.id]) return false;
          if(!availability[p.id][week.weekStart].serviceAvailable) return false;
          return true;
        }).sort((a,b) => {
          const aPref = service === 'Resp' ? (availability[a.id][week.weekStart].respRequested ? -1 : 0)
            : service === 'Nephro' ? (availability[a.id][week.weekStart].nephroRequested ? -1 : 0) : 0;
          const bPref = service === 'Resp' ? (availability[b.id][week.weekStart].respRequested ? -1 : 0)
            : service === 'Nephro' ? (availability[b.id][week.weekStart].nephroRequested ? -1 : 0) : 0;
          if(aPref !== bPref) return aPref - bPref;

          const aDef = serviceDeficitScore(store, a.id, service, requiredTargets) + serviceRecentPenalty(weeks, week.weekStart, a.id, service);
          const bDef = serviceDeficitScore(store, b.id, service, requiredTargets) + serviceRecentPenalty(weeks, week.weekStart, b.id, service);
          if(aDef !== bDef) return aDef - bDef;

          const aOverall = overallWeeklyBurden(store, a.id);
          const bOverall = overallWeeklyBurden(store, b.id);
          if(aOverall !== bOverall) return aOverall - bOverall;

          return a.id.localeCompare(b.id);
        });
        if(candidates[0]){
          week.services[service] = candidates[0].id;
          addAssignmentChargeSimple(store, state, candidates[0].id, 'service', service);
        }
      });
    });

    // Phase 2: fill optional OP services in priority order only if feasible.
    OPTIONAL_OP_SERVICES.forEach(service => {
      weeks.forEach(week => {
        const assigned = peopleAssignedThisWeek(week);
        const candidates = state.physicians.filter(p => {
          if(!canDoService(p, service)) return false;
          if(assigned[p.id]) return false;
          if(!availability[p.id][week.weekStart].serviceAvailable) return false;
          return true;
        }).sort((a,b) => {
          const aOverall = overallWeeklyBurden(store, a.id) + serviceRecentPenalty(weeks, week.weekStart, a.id, service) + opPriorityPenalty(service);
          const bOverall = overallWeeklyBurden(store, b.id) + serviceRecentPenalty(weeks, week.weekStart, b.id, service) + opPriorityPenalty(service);
          if(aOverall !== bOverall) return aOverall - bOverall;
          return a.id.localeCompare(b.id);
        });
        if(candidates[0]){
          week.services[service] = candidates[0].id;
          addAssignmentChargeSimple(store, state, candidates[0].id, 'service', service);
        } else {
          week.services[service] = '';
        }
      });
    });

    // Echo after major services. Keep deterministic rotation, but only among eligible paired holders.
    weeks.forEach((week, idx) => {
      const echoCandidates = state.physicians.filter(p => p.echoEligible && availability[p.id][week.weekStart].serviceAvailable && ECHO_ALLOWED.includes(getPrimaryServiceForPerson(week,p.id)))
        .sort((a,b) => {
          const as = currentScore(store, a.id, 'service');
          const bs = currentScore(store, b.id, 'service');
          if(as !== bs) return as - bs;
          return a.id.localeCompare(b.id);
        });
      if(echoCandidates.length){
        const order = ['CL','DK','DC'];
        const preferred = order[idx % order.length];
        const match = echoCandidates.find(p => p.id === preferred);
        week.services.Echo = (match || echoCandidates[0]).id;
      } else {
        week.services.Echo = '';
      }
    });
  }

  function getPrimaryServiceForPerson(week, personId){
    return MAJOR_SERVICES.find(s => week.services[s] === personId) || '';
  }

  function weekendPreferenceScore(weeks, idx, personId){
    let score = 0;
    const prev = weeks[idx-1];
    const next = weeks[idx+1];
    const prevSvc = prev ? getPrimaryServiceForPerson(prev, personId) : '';
    const nextSvc = next ? getPrimaryServiceForPerson(next, personId) : '';
    if(['ICU','GIM'].includes(prevSvc)) score -= 1.1;
    if(['ICU','GIM'].includes(nextSvc)) score -= 1.0;
    return score;
  }

  function assignWeekendOwners(state, weeks, availability){
    const store = initFairnessStore(state);
    weeks.forEach((week, idx) => {
      const month = monthKey(week.weekendStart);
      const monthCounts = Object.fromEntries(state.physicians.map(p => [p.id, 0]));
      weeks.slice(0,idx).forEach(prev => { if(prev.weekendOwner) monthCounts[prev.weekendOwner] = (monthCounts[prev.weekendOwner]||0)+ (monthKey(prev.weekendStart)===month?1:0); });
      const candidates = state.physicians.filter(p => p.weekendEligible && availability[p.id][week.weekStart].weekendAvailable && (monthCounts[p.id]||0) < 1)
        .sort((a,b) => {
          const aScore = currentScore(store, a.id, 'weekend') + weekendPreferenceScore(weeks, idx, a.id);
          const bScore = currentScore(store, b.id, 'weekend') + weekendPreferenceScore(weeks, idx, b.id);
          if(aScore !== bScore) return aScore - bScore;
          return a.id.localeCompare(b.id);
        });
      if(candidates[0]){
        week.weekendOwner = candidates[0].id;
        addAssignmentChargeSimple(store, state, candidates[0].id, 'weekend');
      }
    });
  }

  function nightAssignmentsMap(nights){ return Object.fromEntries((nights||[]).map(n => [n.date, n.owner])); }
  function hasConsecutiveNight(map, personId, dateStr){
    const prev = iso(addDays(parseDate(dateStr), -1));
    const next = iso(addDays(parseDate(dateStr), 1));
    return map[prev] === personId || map[next] === personId;
  }

  function assignWeekdayNights(state, weeks, availability){
    const store = initFairnessStore(state);
    const out = [];
    const map = {};
    const perMonth = {};
    const perWeek = {};

    weeks.forEach((week, idx) => {
      const mon = parseDate(week.weekStart);
      for(let i=0;i<5;i++){
        const date = iso(addDays(mon,i));
        const month = monthKey(date);
        const prevWeekendOwner = i===0 && idx>0 ? weeks[idx-1].weekendOwner : '';
        const candidates = state.physicians.filter(p => {
          if(!p.nightEligible) return false;
          if(!availability[p.id][week.weekStart].nightAvailable) return false;
          if(hasRequest(state,p.id,'no_call',date,date) || hasRequest(state,p.id,'no_night_call',date,date) || hasVacation(state,p.id,date,date)) return false;
          if((perMonth[`${p.id}:${month}`]||0) >= 4) return false;
          if((perWeek[`${p.id}:${week.weekStart}`]||0) >= 2) return false;
          if(week.weekendOwner === p.id && (perWeek[`${p.id}:${week.weekStart}`]||0) >= 1) return false;
          if(i===4 && week.weekendOwner === p.id) return false;
          if(i===0 && prevWeekendOwner === p.id) return false;
          if(hasConsecutiveNight(map,p.id,date)) return false;
          return true;
        }).sort((a,b) => {
          const as = currentScore(store, a.id, 'night');
          const bs = currentScore(store, b.id, 'night');
          if(as !== bs) return as - bs;
          return a.id.localeCompare(b.id);
        });
        const chosen = candidates[0];
        out.push({ date, owner: chosen ? chosen.id : '', weekend:false, weekStart:week.weekStart });
        if(chosen){
          map[date] = chosen.id;
          perMonth[`${chosen.id}:${month}`] = (perMonth[`${chosen.id}:${month}`]||0)+1;
          perWeek[`${chosen.id}:${week.weekStart}`] = (perWeek[`${chosen.id}:${week.weekStart}`]||0)+1;
          addAssignmentChargeSimple(store, state, chosen.id, 'night');
        }
      }
      out.push({ date: week.weekendStart, owner: week.weekendOwner || '', weekend:true, weekStart:week.weekStart });
      out.push({ date: week.weekendEnd, owner: week.weekendOwner || '', weekend:true, weekStart:week.weekStart });
      if(week.weekendOwner){ map[week.weekendStart] = week.weekendOwner; map[week.weekendEnd] = week.weekendOwner; }
    });
    return out;
  }

  function generatedOverrideRecord(kind, context, fromOwner, toOwner){
    return {
      id:`ovr-${Date.now()}-${Math.random().toString(36).slice(2,8)}`,
      kind,
      context,
      fromOwner,
      toOwner,
      timestamp:new Date().toISOString()
    };
  }

  function validateSchedule(state, weeks, nights){
    const map = personMap(state);
    const issues = [];
    const nightMap = nightAssignmentsMap(nights);
    const weekdayMonthCounts = {};
    const weekendMonthCounts = {};
    const weekdayWeekCounts = {};

    weeks.forEach(week => {
      const assignedPeople = {};
      MAJOR_SERVICES.forEach(service => {
        const owner = week.services[service];
        if(!owner){ if(!OPTIONAL_OP_SERVICES.includes(service)) issues.push({ level:'warning', code:'service-unfilled', message:`${service} unfilled`, weekStart:week.weekStart }); return; }
        if(!canDoService(map[owner], service)) issues.push({ level:'error', code:'service-eligibility', message:`${owner} not eligible for ${service}`, weekStart:week.weekStart });
        if(assignedPeople[owner]) issues.push({ level:'error', code:'double-major-service', message:`${owner} has multiple major services`, weekStart:week.weekStart });
        assignedPeople[owner] = service;
      });
      if(!week.services.Echo) issues.push({ level:'warning', code:'echo-unfilled', message:'Echo unfilled', weekStart:week.weekStart });
      else {
        const base = getPrimaryServiceForPerson(week, week.services.Echo);
        if(!ECHO_ALLOWED.includes(base)) issues.push({ level:'error', code:'illegal-echo-pairing', message:`Echo paired illegally with ${base || 'none'}`, weekStart:week.weekStart });
      }
      if(!week.weekendOwner) issues.push({ level:'warning', code:'weekend-unfilled', message:'Weekend owner unfilled', weekStart:week.weekStart });
      const sat = nights.find(n => n.date === week.weekendStart);
      const sun = nights.find(n => n.date === week.weekendEnd);
      if((sat?.owner||'') !== (sun?.owner||'')) issues.push({ level:'error', code:'weekend-split', message:'Weekend split detected', weekStart:week.weekStart });
      if(week.weekendOwner){
        const mk = `${week.weekendOwner}:${monthKey(week.weekendStart)}`;
        weekendMonthCounts[mk] = (weekendMonthCounts[mk]||0)+1;
      }
    });

    nights.filter(n => !n.weekend).forEach(n => {
      if(!n.owner){ issues.push({ level:'warning', code:'night-unfilled', message:`Night call unfilled on ${n.date}`, date:n.date }); return; }
      if(!canDoService(map[n.owner], 'Night')) issues.push({ level:'error', code:'night-eligibility', message:`${n.owner} not eligible for night call`, date:n.date });
      const prev = iso(addDays(parseDate(n.date), -1));
      if(nightMap[prev] === n.owner) issues.push({ level:'error', code:'back-to-back-night-calls', message:`${n.owner} has back to back night calls`, date:n.date });
      const mk = `${n.owner}:${monthKey(n.date)}`;
      const wk = `${n.owner}:${n.weekStart}`;
      weekdayMonthCounts[mk] = (weekdayMonthCounts[mk]||0)+1;
      weekdayWeekCounts[wk] = (weekdayWeekCounts[wk]||0)+1;
    });

    Object.entries(weekdayMonthCounts).forEach(([k,v]) => { if(v > 4) issues.push({ level:'error', code:'call-limits-exceeded', message:`${k} exceeds 4 weekday calls per month` }); });
    Object.entries(weekdayWeekCounts).forEach(([k,v]) => { if(v > 2) issues.push({ level:'error', code:'call-limits-exceeded', message:`${k} exceeds 2 weekday calls per week` }); });
    Object.entries(weekendMonthCounts).forEach(([k,v]) => { if(v > 1) issues.push({ level:'error', code:'weekend-limits-exceeded', message:`${k} exceeds 1 weekend per month` }); });
    return issues;
  }

  function generateSchedule(state, startDate, endDate){
    const weeks = getWeeks(startDate, endDate);
    const availability = buildAvailability(state, weeks);
    assignMajorServices(state, weeks, availability);
    assignWeekendOwners(state, weeks, availability);
    applyPinnedAssignments(state, weeks);
    const nights = assignWeekdayNights(state, weeks, availability);
    const fairnessSummary = summarizeFairness(state, weeks, nights);
    const validation = validateSchedule(state, weeks, nights);
    return { weeks, nightAssignments:nights, fairnessSummary, validation };
  }

  function persistGeneratedDraft(startDate, endDate){
    const state = window.AppState.loadState();
    const result = generateSchedule(state, startDate, endDate);
    state.settings.scheduleStart = startDate;
    state.settings.scheduleEnd = endDate;
    state.draftWeeks = result.weeks;
    state.draftNightManual = result.nightAssignments;
    state.generatedSummary = { fairnessSummary: result.fairnessSummary, validation: result.validation };
    state.metadata.lastGeneratedAt = new Date().toISOString();
    window.AppState.saveState(state);
    return result;
  }

  function recomputeDraftSummary(state){
    const fairnessSummary = summarizeFairness(state, state.draftWeeks || [], state.draftNightManual || []);
    const validation = validateSchedule(state, state.draftWeeks || [], state.draftNightManual || []);
    return { fairnessSummary, validation };
  }

  function getEligibleOwnersForWeek(state, week, target){
    const all = getAllPeople(state);
    if(target === 'Weekend'){
      return all.filter(person => {
        if(person.type === 'locum') return person.weekendDates?.includes(week.weekendStart);
        return person.weekendEligible && !hasVacation(state, person.id, week.weekStart, week.weekendEnd) && !hasRequest(state, person.id,'weekends_off', week.weekendStart, week.weekendEnd);
      });
    }
    if(target === 'Echo'){
      return all.filter(person => {
        if(person.type === 'locum') return false;
        if(!person.echoEligible) return false;
        const base = getPrimaryServiceForPerson(week, person.id);
        return ECHO_ALLOWED.includes(base);
      });
    }
    if(MAJOR_SERVICES.includes(target)){
      return all.filter(person => {
        if(person.type === 'locum'){
          return (person.weeklyCoverage || []).some(entry => entry.weekStart === week.weekStart && (entry.services || []).includes(target));
        }
        return canDoService(person, target) && !hasVacation(state, person.id, week.weekStart, week.weekEnd);
      });
    }
    return [];
  }

  function getEligibleOwnersForNight(state, nightEntry){
    const all = getAllPeople(state);
    return all.filter(person => {
      if(nightEntry.weekend){
        if(person.type === 'locum') return person.weekendDates?.includes(nightEntry.date);
        return person.weekendEligible;
      }
      if(person.type === 'locum') return person.callDates?.includes(nightEntry.date);
      return person.nightEligible && !hasRequest(state, person.id,'no_call',nightEntry.date,nightEntry.date) && !hasRequest(state, person.id,'no_night_call',nightEntry.date,nightEntry.date) && !hasVacation(state, person.id,nightEntry.date,nightEntry.date);
    });
  }

  function applyWeekOverride(state, weekStart, target, ownerId){
    const week = state.draftWeeks.find(w => w.weekStart === weekStart);
    if(!week) return state;
    const fromOwner = target === 'Weekend' ? week.weekendOwner : week.services[target];
    if(target === 'Weekend') week.weekendOwner = ownerId;
    else week.services[target] = ownerId;
    state.overrideLog.unshift(generatedOverrideRecord(target === 'Weekend' ? 'weekend' : 'service', `${weekStart}:${target}`, fromOwner, ownerId));
    state.generatedSummary = recomputeDraftSummary(state);
    window.AppState.saveState(state);
    return state;
  }

  function applyNightOverride(state, date, ownerId){
    const entry = state.draftNightManual.find(n => n.date === date);
    if(!entry) return state;
    const fromOwner = entry.owner;
    entry.owner = ownerId;
    const week = state.draftWeeks.find(w => w.weekendStart === date || w.weekendEnd === date);
    if(entry.weekend && week){ week.weekendOwner = ownerId; }
    state.overrideLog.unshift(generatedOverrideRecord(entry.weekend ? 'weekend-night' : 'night', date, fromOwner, ownerId));
    state.generatedSummary = recomputeDraftSummary(state);
    window.AppState.saveState(state);
    return state;
  }

  window.SchedulerEngine = {
    MAJOR_SERVICES,
    ROW_SERVICES,
    ECHO_ALLOWED,
    iso,
    parseDate,
    addDays,
    monthKey,
    daterange,
    getWeeks,
    canDoService,
    getPrimaryServiceForPerson,
    generateSchedule,
    persistGeneratedDraft,
    recomputeDraftSummary,
    summarizeFairness,
    validateSchedule,
    getEligibleOwnersForWeek,
    getEligibleOwnersForNight,
    applyWeekOverride,
    applyNightOverride
  };
})();
</script>
<script>(function(){
  const PAGE = window.PAGE_TYPE || document.body?.dataset?.page || 'index';
  const S = () => window.AppState.loadState();
  const serviceRows = window.SchedulerEngine ? window.SchedulerEngine.ROW_SERVICES : [];
  const el = sel => document.querySelector(sel);
  const els = sel => Array.from(document.querySelectorAll(sel));

  function fmtDateTime(v){ if(!v) return 'Not yet'; try{return new Date(v).toLocaleString();}catch(e){return v;} }
  function fmtDate(v){ if(!v) return ''; try{return new Date(v+'T12:00:00').toLocaleDateString(undefined,{month:'short',day:'numeric'});}catch(e){return v;} }
  function safe(str){ return String(str ?? '').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }
  function peopleMap(state){ return Object.fromEntries([...state.physicians, ...state.locums].map(p => [p.id,p])); }
  function physicianMap(state){ return Object.fromEntries(state.physicians.map(p => [p.id,p])); }
  function badge(text, cls=''){ return `<span class="badge ${cls}">${safe(text)}</span>`; }
  
  function todayIso(){
    const now = new Date();
    return new Date(now.getTime() - now.getTimezoneOffset()*60000).toISOString().slice(0,10);
  }

  function isCurrentWeekRange(startStr, endStr){
    const today = todayIso();
    const end = endStr || startStr;
    return !!startStr && startStr <= today && today <= end;
  }

  function servicePill(service, variant){
    const cls = String(service || '').toLowerCase();
    return `<span class="service-pill ${safe(cls)} ${variant || ''}">${safe(service)}</span>`;
  }

function chipForOwner(state, ownerId, kind=''){ 
    if(!ownerId) return `<span class="assign-chip unfilled">Unfilled</span>`;
    const p = peopleMap(state)[ownerId];
    if(!p) return `<span class="assign-chip">${safe(ownerId)}</span>`;
    const cls = p.type === 'locum' ? 'locum' : (kind==='weekend' ? 'weekend' : '');
    const label = p.type === 'locum' ? `${p.name}${p.generalLocum ? ' (Gen)' : ` → ${p.coveringPhysician || 'Cover'}`}` : p.name;
    return `<span class="assign-chip ${cls}">${safe(label)}</span>`;
  }
  function requestLabel(type){
    return {
      vacation:'Vacation',
      no_call:'No Call',
      no_night_call:'No Night Call',
      weekends_off:'Weekends Off',
      resp_week_request:'Resp Week Request',
      nephro_week_request:'Nephro Week Request'
    }[type] || type;
  }
  function allRequestTypes(){ return ['vacation','no_call','no_night_call','weekends_off','resp_week_request','nephro_week_request']; }

  function baseShell(title, subtitle, tabs, inspectorTitle='Inspector'){
    return `
      <div class="page-shell">
        <aside class="sidebar">
          <div class="brand">Department Scheduling</div>
          <div class="brand-sub">${safe(subtitle)}</div>
          <nav class="side-nav">
            ${tabs.map(t => `<button data-tab="${t.key}" class="${t.active?'active':''}">${safe(t.label)}</button>`).join('')}
          </nav>
          <div class="side-footer">
            <div>Local browser build</div>
            <div class="small">Shared state updates across pages</div>
          </div>
        </aside>
        <main class="main-panel">
          <div class="topbar">
            <div class="title-block">
              <h1>${safe(title)}</h1>
              <p class="subtitle">${safe(subtitle)}</p>
            </div>
            <div id="topActions"></div>
          </div>
          <div id="summaryBar"></div>
          <div id="mainContent"></div>
        </main>
        <aside class="inspector">
          <h3>${safe(inspectorTitle)}</h3>
          <div id="inspectorContent"></div>
        </aside>
      </div>`;
  }

  function attachTabBehavior(onChange){
    els('.side-nav button').forEach(btn => btn.addEventListener('click', () => {
      els('.side-nav button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      onChange(btn.dataset.tab);
    }));
  }

  function renderIndex(){
    document.body.innerHTML = `
      <div class="home-shell">
        <div class="brand">Department Scheduling</div>
        <p class="subtitle">Open the tool you need. All pages share the same local saved state.</p>
        <div class="home-grid">
          <a class="portal-link" href="admin.html"><h2>Admin Dashboard</h2><div>Generate, review, validate, override, and publish.</div></a>
          <a class="portal-link" href="physician.html"><h2>Physician Portal</h2><div>See assignments and submit requests.</div></a>
          <a class="portal-link" href="locum.html"><h2>Locum Portal</h2><div>Choose service coverage and explicit call dates.</div></a>
          <a class="portal-link" href="mobile_snapshot.html"><h2>Mobile Snapshot</h2><div>Read only quick view.</div></a>
        </div>
      </div>`;
  }

  function ensureSummary(state){
    state.generatedSummary = state.generatedSummary || window.SchedulerEngine.recomputeDraftSummary(state);
    return state.generatedSummary;
  }

  function adminTopActions(state){
    return `
      <div class="top-inputs">
        <label>Start</label><input id="adminStart" type="date" value="${safe(state.settings.scheduleStart || '')}">
        <label>End</label><input id="adminEnd" type="date" value="${safe(state.settings.scheduleEnd || '')}">
        <button class="primary" id="generateBtn">Generate Schedule</button>
        <button class="ghost" id="clearDraftBtn">Clear Draft</button>
        <button class="ghost" id="reloadBtn">Reload Saved Data</button>
        <button class="success" id="publishBtn">Finalize and Publish</button>
      </div>`;
  }

  function computeSummaryCounts(state){
    const summary = ensureSummary(state);
    const countServices = serviceRows.filter(s => !['Weekend','Echo','OP2','OP3'].includes(s));
    return {
      unresolvedRequests:(state.requests||[]).filter(r => r.status !== 'approved' && r.status !== 'denied').length,
      unfilledAssignments:(state.draftWeeks||[]).reduce((n,w) => n + countServices.filter(s => !w.services[s]).length + (!w.weekendOwner?1:0),0)
        + (state.draftNightManual||[]).filter(n => !n.owner).length,
      warnings:(summary.validation||[]).length,
      scheduleRange:(state.settings.scheduleStart && state.settings.scheduleEnd) ? `${fmtDate(state.settings.scheduleStart)} – ${fmtDate(state.settings.scheduleEnd)}` : 'No range'
    };
  }

  function renderAdmin(){
    const state = S();
    const tabs = [
      ['overview','Overview'],['master','Master Schedule'],['night','Night Call Calendar'],['requests','Requests'],['fairness','Fairness'],['overrides','Overrides'],['physicians','Physician Summary'],['locums','Locum Coverage'],['publish','Publish Review']
    ].map((x,i) => ({key:x[0], label:x[1], active:i===0}));
    document.body.innerHTML = baseShell('Admin Dashboard','Draft and published schedule control',tabs,'Assignment Inspector');
    el('#topActions').innerHTML = adminTopActions(state);
    renderAdminSummaryBar();
    const active = { key:'overview' };
    function redraw(tabKey){
      active.key = tabKey || active.key;
      renderAdminSummaryBar();
      const st = S();
      const summary = ensureSummary(st);
      const main = el('#mainContent');
      const inspector = el('#inspectorContent');
      if(active.key === 'overview'){
        main.innerHTML = renderAdminOverview(st, summary);
        inspector.innerHTML = renderOverviewInspector(st, summary);
      } else if(active.key === 'master'){
        main.innerHTML = renderMasterSchedule(st);
        inspector.innerHTML = '<div class="detail-box">Click a schedule cell to manually reassign that weekly service or weekend owner.</div>';
        bindMasterSchedule();
      } else if(active.key === 'night'){
        main.innerHTML = renderNightCalendar(st);
        inspector.innerHTML = '<div class="detail-box">Click a night cell to manually reassign call. Weekend cells update the weekend owner.</div>';
        bindNightCalendar();
      } else if(active.key === 'requests'){
        main.innerHTML = renderRequestsAdmin(st);
        inspector.innerHTML = '<div class="detail-box">Review incoming requests. Vacation, no call, no night call, and weekends off are hard blocks. Resp and nephro requests are soft preferences.</div>';
        bindRequestAdmin();
      } else if(active.key === 'fairness'){
        main.innerHTML = renderFairness(st, summary);
        inspector.innerHTML = '<div class="detail-box">Fairness is shown by category. DC weighting affects weekly services, weekends, and weekday call. BB weighting affects ICU and weekday call.</div>';
      } else if(active.key === 'overrides'){
        main.innerHTML = renderOverrides(st);
        inspector.innerHTML = '<div class="detail-box">Each manual change logs the original owner, the replacement, and the timestamp.</div>';
        bindOverrides();
      } else if(active.key === 'physicians'){
        main.innerHTML = renderPhysicianSummary(st, summary);
        inspector.innerHTML = '<div class="detail-box">These cards summarize burden and approved requests for each physician.</div>';
      } else if(active.key === 'locums'){
        main.innerHTML = renderLocumCoverage(st);
        inspector.innerHTML = '<div class="detail-box">Locums are not in the automatic pooled call algorithm. Admin can assign them manually where they explicitly volunteered.</div>';
      } else if(active.key === 'publish'){
        main.innerHTML = renderPublishReview(st, summary);
        inspector.innerHTML = '<div class="detail-box">Publish copies Draft Schedule to Published Schedule as a snapshot. Drafts can continue changing afterward.</div>';
        bindPublishReview();
      }
    }

    attachTabBehavior(redraw);
    bindAdminTopActions(redraw);
    redraw('overview');
  }

  function renderAdminSummaryBar(){
    const state = S();
    const counts = computeSummaryCounts(state);
    el('#summaryBar').innerHTML = `
      <div class="summary-grid">
        <div class="card stat-card"><h3>Status</h3><div class="stat-value">${state.publishedWeeks?.length ? 'Draft + Published' : 'Draft Only'}</div><div class="stat-sub">${counts.scheduleRange}</div></div>
        <div class="card stat-card"><h3>Unresolved Requests</h3><div class="stat-value">${counts.unresolvedRequests}</div><div class="stat-sub">Needs review</div></div>
        <div class="card stat-card"><h3>Unfilled Assignments</h3><div class="stat-value">${counts.unfilledAssignments}</div><div class="stat-sub">Weekly + call</div></div>
        <div class="card stat-card"><h3>Warnings</h3><div class="stat-value">${counts.warnings}</div><div class="stat-sub">Validation flags</div></div>
        <div class="card stat-card"><h3>Last Generated</h3><div class="stat-value" style="font-size:15px">${safe(fmtDateTime(state.metadata.lastGeneratedAt))}</div><div class="stat-sub">Draft schedule</div></div>
        <div class="card stat-card"><h3>Last Published</h3><div class="stat-value" style="font-size:15px">${safe(fmtDateTime(state.metadata.lastPublishedAt))}</div><div class="stat-sub">Published snapshot</div></div>
      </div>`;
  }

  function renderAdminOverview(state, summary){
    const validation = summary.validation || [];
    const topIssues = validation.slice(0,8);
    const coveragePct = state.draftWeeks?.length ? Math.round(100 * ((serviceRows.length * state.draftWeeks.length + (state.draftNightManual||[]).length - computeSummaryCounts(state).unfilledAssignments) / ((serviceRows.length * state.draftWeeks.length) + (state.draftNightManual||[]).length || 1))) : 0;
    return `
      <div class="panel-grid">
        <div class="stack">
          <div class="card">
            <div class="section-title"><h2>Overview</h2>${badge(`${coveragePct}% coverage`, coveragePct > 95 ? 'good' : coveragePct > 80 ? 'warn':'bad')}</div>
            <div class="card-grid-2">
              <div class="quick-card"><strong>Coverage Completion</strong><div class="small">Tracks filled weekly assignments and call dates in the draft.</div></div>
              <div class="quick-card"><strong>Pending Requests</strong><div class="small">${(state.requests||[]).filter(r => r.status !== 'approved' && r.status !== 'denied').length} still need review.</div></div>
              <div class="quick-card"><strong>Conflicts</strong><div class="small">${validation.filter(v => v.level==='error').length} errors and ${validation.filter(v => v.level!=='error').length} warnings.</div></div>
              <div class="quick-card"><strong>Fairness Snapshot</strong><div class="small">See category burden table in the Fairness section.</div></div>
            </div>
          </div>
          <div class="card">
            <div class="section-title"><h2>Quick Links</h2></div>
            <div class="inline-actions">
              <button class="btn" data-jump="master">Open Master Schedule</button>
              <button class="btn" data-jump="night">Open Night Call View</button>
              <button class="btn" data-jump="requests">Open Requests View</button>
              <button class="btn" data-jump="fairness">Open Fairness View</button>
            </div>
          </div>
        </div>
        <div class="card">
          <div class="section-title"><h2>Top Warnings</h2></div>
          <div class="notice-list">
            ${topIssues.length ? topIssues.map(v => `<div class="notice ${v.level}">${safe(v.message)} ${v.weekStart ? `<span class="small">${safe(v.weekStart)}</span>`:''} ${v.date ? `<span class="small">${safe(v.date)}</span>`:''}</div>`).join('') : '<div class="notice">No current warnings.</div>'}
          </div>
        </div>
      </div>`;
  }

  function renderOverviewInspector(state, summary){
    const fairness = (summary.fairnessSummary||[]).slice(0,6);
    return `
      <div class="detail-box">
        <strong>Schedule Status</strong>
        <div class="kv" style="margin-top:10px">
          <div>Range</div><div>${safe(state.settings.scheduleStart || '—')} to ${safe(state.settings.scheduleEnd || '—')}</div>
          <div>Draft Weeks</div><div>${(state.draftWeeks||[]).length}</div>
          <div>Published Weeks</div><div>${(state.publishedWeeks||[]).length}</div>
        </div>
      </div>
      <div class="detail-box">
        <strong>Lowest Current Burden</strong>
        <div class="list" style="margin-top:10px">
          ${fairness.map(f => `<div class="list-item"><strong>${safe(f.name)}</strong><div class="small">Composite ${f.compositeScore} · ICU ${f.icuWeeks} · Weekends ${f.weekends} · Nights ${f.nightCalls}</div></div>`).join('') || '<div class="small">Generate a draft to see fairness.</div>'}
        </div>
      </div>`;
  }

  function renderMasterSchedule(state){
    const weeks = state.draftWeeks || [];
    if(!weeks.length) return `<div class="card"><strong>No draft schedule yet.</strong><div class="small">Generate a schedule from the top bar to populate the master schedule.</div></div>`;

  function renderMonth(state, month, entries){
    const first = new Date(month + '-01T12:00:00');
    const startPad = first.getDay();
    const last = new Date(first.getFullYear(), first.getMonth()+1, 0, 12);
    const days = [];
    for(let i=0;i<startPad;i++) days.push(null);
    for(let d=1; d<=last.getDate(); d++){
      const date = `${month}-${String(d).padStart(2,'0')}`;
      days.push(entries.find(e => e.date === date) || { date, owner:'', weekend:[0,6].includes(new Date(date+'T12:00:00').getDay()) });
    }
    while(days.length % 7) days.push(null);
    return `
      <div class="calendar-month" style="margin-bottom:14px">
        <div class="month-title">${safe(first.toLocaleDateString(undefined,{month:'long',year:'numeric'}))}</div>
        <div class="month-grid">
          ${['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].map(d => `<div class="day-head">${d}</div>`).join('')}
          ${days.map(day => {
            if(!day) return '<div class="day-cell"></div>';
            const p = peopleMap(state)[day.owner];
            const cls = `${day.weekend?'weekend':''} ${!day.owner?'unfilled':''}`;
            return `<div class="day-cell ${cls}" data-night-date="${day.date}">
              <div class="day-num">${safe(day.date.slice(-2))}</div>
              <div>${day.owner ? `<span class="day-owner ${p?.type==='locum'?'locum':''} ${day.weekend?'weekend':''}">${safe(p?.name || day.owner)}</span>` : '<span class="day-owner">Unfilled</span>'}</div>
            </div>`;
          }).join('')}
        </div>
      </div>`;
  }

  function renderDateStrip(container, dates, selection, mode='range'){
    container.innerHTML = `<div class="request-strip">${dates.map(d => {
      const cls = selection.single === d ? 'single' : selection.start === d || selection.end === d ? 'active' : selection.range?.includes(d) ? 'in-range' : '';
      const dt = new Date(d+'T12:00:00');
      return `<button type="button" class="date-pill ${cls}" data-date-pill="${d}"><small>${dt.toLocaleDateString(undefined,{weekday:'short'})}</small>${dt.getDate()}</button>`;
    }).join('')}</div>`;
    els('[data-date-pill]').forEach(btn => btn.addEventListener('click', () => {
      const d = btn.dataset.datePill;
      if(mode === 'single'){
        selection.single = selection.single === d ? '' : d;
      } else {
        if(!selection.start || (selection.start && selection.end)){
          selection.start = d; selection.end = ''; selection.range = [d];
        } else {
          if(d < selection.start){ selection.end = selection.start; selection.start = d; }
          else selection.end = d;
          selection.range = dateRangeStrings(selection.start, selection.end);
        }
      }
      renderDateStrip(container, dates, selection, mode);
      if(container.dataset.onchange) window[container.dataset.onchange]?.();
    }));
  }

  function dateRangeStrings(start, end){
    const out=[]; let cur = new Date(start+'T12:00:00'); const stop = new Date(end+'T12:00:00');
    while(cur <= stop){ out.push(window.SchedulerEngine.iso(cur)); cur = window.SchedulerEngine.addDays(cur,1); }
    return out;
  }

  function renderMySchedule(state,pid){

    const weeks = selectedArchive?.weeks || [];

      const services = ['ICU','GIM','CAR1','CAR2','Resp','Nephro','OP1','OP2','OP3','Echo']

      return { weekStart:w.weekStart, weekEnd:w.weekEnd, services, weekend, nights, current:isCurrentWeekRange(w.weekStart, w.weekEnd) };
    }).filter(Boolean);

    const current = rows.find(r => r.current) || rows.find(r => r.weekStart >= todayIso()) || rows[0];

  function monthKeysBetween(startStr, endStr){
    const start = window.SchedulerEngine.parseDate(startStr);

    const out = [];
    let y = start.getFullYear(), m = start.getMonth();
    while (y < end.getFullYear() || (y === end.getFullYear() && m <= end.getMonth())){
      out.push(`${y}-${String(m+1).padStart(2,'0')}`);
      m += 1;
      if(m > 11){ m = 0; y += 1; }
    }
    return out;
  }
  function renderMonthCalendar(monthKey, buildCell){

    let html = `<div class="month-card"><div class="month-header">${safe(monthLabel(monthKey))}</div><div class="month-grid">`;
    ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].forEach(d => { html += `<div class="day-head">${d}</div>`; });
    for(let i=0;i<startDow;i++) html += `<div class="day-cell muted"></div>`;
    for(let day=1; day<=daysInMonth; day++){
      const dateStr = `${monthKey}-${String(day).padStart(2,'0')}`;
      html += buildCell(dateStr, day);
    }
    html += `</div></div>`;
    return html;
  }

        <div class="selector-grid">
          <div><label class="small">Physician</label><select id="mobilePhysicianSelect" class="field" style="width:100%">${state.physicians.map(p => `<option value="${p.id}" ${p.id===currentId?'selected':''}>${p.name}</option>`).join('')}</select></div>
          <div><label class="small">Year</label><select id="mobilePhysYear" class="field" style="width:100%">${availablePortalYears(state).map(y => `<option value="${y}" ${y===year?'selected':''}>${y}</option>`).join('')}</select></div>
          <div><label class="small">Schedule</label><select id="mobilePhysSchedule" class="field" style="width:100%">${archives.length ? archives.map(a => `<option value="${a.id}" ${selectedArchive && a.id===selectedArchive.id?'selected':''}>${safe(archivePeriodLabel(a))}</option>`).join('') : `<option value="">No Published Schedule</option>`}</select></div>
        </div>
      </div>
      ${renderMySchedule(state, currentId)}
      <div class="card" style="margin-top:14px">
        <div class="section-title"><h2>Night Call Calendar</h2>${badge('Read only')}</div>
        ${months.length ? `
          <div class="night-month-nav">
            <button class="btn ghost" id="mobileNightPrevMonthBtn" ${activeIndex <= 0 ? 'disabled' : ''}>Previous Month</button>
            <div class="month-label">${safe(monthLabel(activeMonth))}</div>
            <button class="btn ghost" id="mobileNightNextMonthBtn" ${activeIndex >= months.length - 1 ? 'disabled' : ''}>Next Month</button>
          </div>
          <div class="month-card">
            <div class="month-header">${safe(monthLabel(activeMonth))}</div>
            <div class="month-grid">
              ${['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].map(d => `<div class="day-head">${d}</div>`).join('')}
              ${(() => {
                const [y,m] = activeMonth.split('-').map(Number);
                const first = new Date(y, m-1, 1);
                const startDow = first.getDay();
                const daysInMonth = new Date(y, m, 0).getDate();
                let html = '';
                for(let i=0;i<startDow;i++) html += `<div class="day-cell muted"></div>`;
                for(let day=1; day<=daysInMonth; day++){
                  const dateStr = `${activeMonth}-${String(day).padStart(2,'0')}`;
                  const entry = byDate[dateStr];
                  const weekend = entry?.weekend;
                  const mine = entry?.owner === currentId;
                  const cls = ['day-cell', weekend ? 'weekend' : '', mine ? 'mine' : '', dateStr === todayIso() ? 'today' : ''].join(' ').trim();
                  const label = entry ? chipForOwner(state, entry.owner, weekend ? 'weekend' : '') : '<span class="small">—</span>';
                  html += `<div class="${cls}"><span class="day-num">${day}</span>${label}<span class="day-note">${entry ? (weekend ? 'Weekend call' : 'Night call') : ''}</span></div>`;
                }
                return html;
              })()}
            </div>
          </div>
        ` : '<div class="list-item">No night call schedule available.</div>'}
      </div>
    </div>`;
    const ps = document.querySelector('#mobilePhysicianSelect');
    if(ps) ps.onchange = e => { localStorage.setItem('schedPhysicianSelected', e.target.value); renderMobile(); };
    const ys = document.querySelector('#mobilePhysYear');
    if(ys) ys.onchange = e => { localStorage.setItem('physPortalYear', e.target.value); localStorage.removeItem('physPublishedArchiveId'); localStorage.removeItem('mobileNightMonth'); renderMobile(); };
    const ss = document.querySelector('#mobilePhysSchedule');
    if(ss) ss.onchange = e => { localStorage.setItem('physPublishedArchiveId', e.target.value); localStorage.removeItem('mobileNightMonth'); renderMobile(); };
    const prevBtn = document.querySelector('#mobileNightPrevMonthBtn');
    const nextBtn = document.querySelector('#mobileNightNextMonthBtn');
    if(prevBtn) prevBtn.onclick = () => {
      if(activeIndex > 0){
        localStorage.setItem('mobileNightMonth', months[activeIndex - 1]);
        renderMobile();
      }
    };
    if(nextBtn) nextBtn.onclick = () => {
      if(activeIndex < months.length - 1){
        localStorage.setItem('mobileNightMonth', months[activeIndex + 1]);
        renderMobile();
      }
    };
  }

  document.addEventListener('DOMContentLoaded', () => {
    try{
      if(PAGE==='index') renderIndex();
      else if(PAGE==='admin') renderAdmin();
      else if(PAGE==='physician') renderPhysician();
      else if(PAGE==='locum') renderLocum();
      else if(PAGE==='mobile') renderMobile();
      else renderIndex();
    }catch(err){
      console.error(err);
      document.body.innerHTML = `<div class="home-shell"><div class="brand">Department Scheduling</div><p class="subtitle">The page failed to render.</p><pre class="card">${safe(err.stack || String(err))}</pre></div>`;
    }
  });
})();
</script>
</body>
</html>
